<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mastermind 猜颜色</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    padding: 12px;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .wrapper {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 600px;
    margin: 0 auto;
  }
  .game-panel, .leaderboard-panel {
    background: white;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .game-title {
    text-align: center;
    color: #2c3e50;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 2px;
  }
  .game-subtitle {
    text-align: center;
    color: #7f8c8d;
    font-size: 13px;
    margin-bottom: 14px;
  }
  .secret-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 14px;
    padding: 14px;
    background: #34495e;
    border-radius: 12px;
  }
  .secret-peg {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #2c3e50;
    border: 3px solid #1a252f;
    transition: all 0.5s ease;
  }
  .secret-peg.revealed {
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
  }
  .board {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
    max-height: 320px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-right: 2px;
  }
  .guess-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #ecf0f1;
    border-radius: 10px;
    border: 2px solid #bdc3c7;
    min-height: 52px;
  }
  .guess-row.current {
    border-color: #3498db;
    background: #ebf5fb;
  }
  .guess-pegs {
    display: flex;
    gap: 8px;
    flex: 1;
    justify-content: center;
  }
  .peg {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.12);
    cursor: pointer;
    transition: transform 0.12s;
    background: #ddd;
    -webkit-touch-callout: none;
    user-select: none;
    touch-action: manipulation;
  }
  .peg:active { transform: scale(0.92); }
  .feedback-pegs {
    display: grid;
    grid-template-columns: repeat(2, 14px);
    gap: 3px;
    flex-shrink: 0;
  }
  .feedback-peg {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.08);
  }
  .fb-black { background: #2c3e50; }
  .fb-white { background: #ecf0f1; border: 1px solid #bdc3c7; }
  .fb-empty { background: transparent; border: 1px dashed #bdc3c7; }
  .palette {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    padding: 0 4px;
  }
  .palette-peg {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all 0.15s;
    -webkit-touch-callout: none;
    user-select: none;
    touch-action: manipulation;
  }
  .palette-peg:active { transform: scale(0.9); }
  .palette-peg.active {
    border-color: #2c3e50;
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .btn {
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-touch-callout: none;
    user-select: none;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: #27ae60;
    color: white;
    box-shadow: 0 2px 6px rgba(39,174,96,0.3);
  }
  .btn-primary:disabled {
    background: #95a5a6;
    cursor: not-allowed;
    box-shadow: none;
  }
  .btn-secondary {
    background: #e74c3c;
    color: white;
    box-shadow: 0 2px 6px rgba(231,76,60,0.3);
  }
  .status {
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    min-height: 22px;
    margin-bottom: 10px;
  }
  .status.win { color: #27ae60; }
  .status.lose { color: #e74c3c; }
  .rules {
    background: #f8f9fa;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    color: #555;
    line-height: 1.5;
    border-left: 3px solid #3498db;
  }
  .rules strong { color: #2c3e50; }
  .peg-red { background: #e74c3c; }
  .peg-blue { background: #3498db; }
  .peg-green { background: #2ecc71; }
  .peg-yellow { background: #f1c40f; }
  .peg-purple { background: #9b59b6; }
  .peg-orange { background: #e67e22; }
  .peg-cyan { background: #1abc9c; }
  .peg-pink { background: #fd79a8; }
  .lb-title {
    text-align: center;
    font-size: 17px;
    font-weight: bold;
    color: #2c3e50;
    margin-bottom: 12px;
  }
  .lb-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .lb-item {
    display: flex;
    align-items: center;
    padding: 8px 10px;
    border-radius: 8px;
    background: #f8f9fa;
  }
  .lb-rank {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 12px;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .rank-1 { background: #f1c40f; color: #fff; }
  .rank-2 { background: #bdc3c7; color: #fff; }
  .rank-3 { background: #e67e22; color: #fff; }
  .rank-other { background: #ecf0f1; color: #7f8c8d; }
  .lb-info { flex: 1; min-width: 0; }
  .lb-name {
    font-size: 13px;
    font-weight: 600;
    color: #2c3e50;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lb-detail { font-size: 10px; color: #95a5a6; margin-top: 1px; }
  .lb-score {
    font-size: 16px;
    font-weight: bold;
    color: #27ae60;
  }
  .lb-empty {
    text-align: center;
    color: #bdc3c7;
    font-size: 12px;
    padding: 16px 0;
  }
  .lb-reset {
    margin-top: 10px;
    text-align: center;
  }
  .lb-reset-btn {
    background: none;
    border: none;
    color: #e74c3c;
    font-size: 11px;
    cursor: pointer;
    opacity: 0.6;
  }
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: white;
    padding: 24px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 300px;
  }
  .modal-box h3 { color: #2c3e50; margin-bottom: 6px; font-size: 18px; }
  .modal-box p { color: #7f8c8d; font-size: 13px; margin-bottom: 14px; }
  .modal-box input {
    width: 100%;
    padding: 12px;
    border: 2px solid #bdc3c7;
    border-radius: 10px;
    font-size: 16px;
    text-align: center;
    margin-bottom: 14px;
    outline: none;
    -webkit-appearance: none;
  }
  .modal-box input:focus { border-color: #3498db; }
  .modal-box .btn { width: 100%; }
  .share-area {
    margin-top: 10px;
    text-align: center;
  }
  .share-btn {
    background: #3498db;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    -webkit-touch-callout: none;
    user-select: none;
  }
  .share-btn:active { transform: scale(0.96); }
  @media (min-width: 700px) {
    .wrapper { flex-direction: row; gap: 16px; }
    .game-panel { flex: 1; }
    .leaderboard-panel { width: 240px; position: sticky; top: 16px; }
  }
</style>
</head>
<body>
  <div class="modal-overlay" id="nameModal">
    <div class="modal-box">
      <h3>🏆 恭喜通关！</h3>
      <p id="winMsg">你在 X 次内猜对了！</p>
      <input type="text" id="playerName" placeholder="输入你的名字" maxlength="12" autocomplete="off">
      <button class="btn btn-primary" onclick="saveScore()">保存成绩</button>
    </div>
  </div>

  <div class="wrapper">
    <div class="game-panel">
      <div class="game-title">🎯 Mastermind</div>
      <div class="game-subtitle">破解秘密颜色组合</div>

      <div class="secret-row" id="secretRow">
        <div class="secret-peg" id="s0"></div>
        <div class="secret-peg" id="s1"></div>
        <div class="secret-peg" id="s2"></div>
        <div class="secret-peg" id="s3"></div>
      </div>

      <div class="status" id="status">选择颜色，点击空位放置</div>

      <div class="board" id="board"></div>

      <div class="palette" id="palette"></div>

      <div class="controls">
        <button class="btn btn-primary" id="guessBtn" onclick="submitGuess()">确认猜测</button>
        <button class="btn btn-secondary" onclick="newGame()">新游戏</button>
      </div>

      <div class="share-area">
        <button class="share-btn" onclick="shareGame()">📤 分享给朋友</button>
      </div>

      <div class="rules" style="margin-top:12px;">
        <strong>规则：</strong>4个颜色秘密代码（可重复）。黑钉=位置颜色都对，白钉=颜色对位置错。10次机会！
      </div>
    </div>

    <div class="leaderboard-panel">
      <div class="lb-title">🏅 排行榜</div>
      <div class="lb-list" id="leaderboard">
        <div class="lb-empty">暂无记录<br>快来成为第一个！</div>
      </div>
      <div class="lb-reset">
        <button class="lb-reset-btn" onclick="clearLeaderboard()">清空排行榜</button>
      </div>
    </div>
  </div>

<script>
  const COLORS = [
    { name: 'red', class: 'peg-red' },
    { name: 'blue', class: 'peg-blue' },
    { name: 'green', class: 'peg-green' },
    { name: 'yellow', class: 'peg-yellow' },
    { name: 'purple', class: 'peg-purple' },
    { name: 'orange', class: 'peg-orange' },
    { name: 'cyan', class: 'peg-cyan' },
    { name: 'pink', class: 'peg-pink' }
  ];
  const PEGS_PER_ROW = 4;
  const MAX_GUESSES = 10;
  const STORAGE_KEY = 'mastermind_scores_v2';

  let secret = [], currentGuess = [null,null,null,null], guesses = [];
  let gameOver = false, selectedPaletteIndex = 0, pendingScore = null;

  function init() {
    renderPalette();
    renderLeaderboard();
    newGame();
  }

  function getScores() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    } catch (e) { return []; }
  }
  function saveScores(scores) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
  }

  function renderLeaderboard() {
    const container = document.getElementById('leaderboard');
    const scores = getScores();
    if (scores.length === 0) {
      container.innerHTML = '<div class="lb-empty">暂无记录<br>快来成为第一个！</div>';
      return;
    }
    container.innerHTML = '';
    scores.forEach((s, i) => {
      const item = document.createElement('div');
      item.className = 'lb-item';
      const rc = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
      item.innerHTML = '<div class="lb-rank ' + rc + '">' + (i+1) + '</div><div class="lb-info"><div class="lb-name">' + escapeHtml(s.name) + '</div><div class="lb-detail">' + s.date + '</div></div><div class="lb-score">' + s.guesses + '次</div>';
      container.appendChild(item);
    });
  }
  function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
  }
  function clearLeaderboard() {
    if (confirm('确定清空排行榜？')) {
      localStorage.removeItem(STORAGE_KEY);
      renderLeaderboard();
    }
  }

  function renderPalette() {
    const p = document.getElementById('palette');
    p.innerHTML = '';
    COLORS.forEach((c, i) => {
      const peg = document.createElement('div');
      peg.className = 'palette-peg ' + c.class + (i === 0 ? ' active' : '');
      peg.title = c.name;
      peg.onclick = function() { selectPalette(i); };
      p.appendChild(peg);
    });
  }
  function selectPalette(i) {
    selectedPaletteIndex = i;
    document.querySelectorAll('.palette-peg').forEach((el, idx) => {
      el.classList.toggle('active', idx === i);
    });
  }

  function newGame() {
    secret = [];
    for (let i = 0; i < PEGS_PER_ROW; i++) secret.push(Math.floor(Math.random() * COLORS.length));
    currentGuess = [null,null,null,null];
    guesses = [];
    gameOver = false;
    pendingScore = null;
    document.getElementById('status').textContent = '选择颜色，点击空位放置';
    document.getElementById('status').className = 'status';
    document.getElementById('guessBtn').disabled = false;
    document.getElementById('board').innerHTML = '';
    document.getElementById('nameModal').classList.remove('show');
    hideSecret();
    addGuessRow();
  }
  function hideSecret() {
    for (let i = 0; i < PEGS_PER_ROW; i++) {
      const p = document.getElementById('s'+i);
      p.className = 'secret-peg';
      p.style.background = '#2c3e50';
    }
  }
  function revealSecret() {
    for (let i = 0; i < PEGS_PER_ROW; i++) {
      document.getElementById('s'+i).className = 'secret-peg revealed ' + COLORS[secret[i]].class;
    }
  }

  function addGuessRow() {
    const board = document.getElementById('board');
    const row = document.createElement('div');
    row.className = 'guess-row current';
    row.id = 'row-' + guesses.length;

    const gp = document.createElement('div');
    gp.className = 'guess-pegs';
    for (let i = 0; i < PEGS_PER_ROW; i++) {
      const peg = document.createElement('div');
      peg.className = 'peg';
      peg.id = 'g-'+guesses.length+'-'+i;
      peg.onclick = (function(pos) { return function() { setPeg(pos); }; })(i);
      gp.appendChild(peg);
    }

    const fb = document.createElement('div');
    fb.className = 'feedback-pegs';
    fb.id = 'f-'+guesses.length;
    for (let i = 0; i < PEGS_PER_ROW; i++) {
      const d = document.createElement('div');
      d.className = 'feedback-peg fb-empty';
      fb.appendChild(d);
    }

    row.appendChild(gp);
    row.appendChild(fb);
    board.appendChild(row);
    board.scrollTop = board.scrollHeight;
  }

  function setPeg(pos) {
    if (gameOver) return;
    currentGuess[pos] = selectedPaletteIndex;
    document.getElementById('g-'+guesses.length+'-'+pos).className = 'peg ' + COLORS[selectedPaletteIndex].class;
  }

  function submitGuess() {
    if (gameOver) return;
    if (currentGuess.includes(null)) {
      document.getElementById('status').textContent = '请先填满4个颜色！';
      document.getElementById('status').className = 'status lose';
      return;
    }

    const fb = evaluateGuess(currentGuess);
    renderFeedback(guesses.length, fb);
    guesses.push([...currentGuess]);
    document.getElementById('row-'+(guesses.length-1)).classList.remove('current');

    if (fb.black === PEGS_PER_ROW) {
      gameOver = true;
      revealSecret();
      document.getElementById('status').textContent = '🎉 恭喜你！猜对了！';
      document.getElementById('status').className = 'status win';
      document.getElementById('guessBtn').disabled = true;
      pendingScore = guesses.length;
      document.getElementById('winMsg').textContent = '你在 ' + guesses.length + ' 次内猜对了！';
      document.getElementById('playerName').value = '';
      document.getElementById('nameModal').classList.add('show');
      document.getElementById('playerName').focus();
      return;
    }

    if (guesses.length >= MAX_GUESSES) {
      gameOver = true;
      revealSecret();
      document.getElementById('status').textContent = '💥 机会用完！游戏结束。';
      document.getElementById('status').className = 'status lose';
      document.getElementById('guessBtn').disabled = true;
      return;
    }

    currentGuess = [null,null,null,null];
    addGuessRow();
    document.getElementById('status').textContent = '第 ' + (guesses.length+1) + ' 次猜测 — 继续加油！';
    document.getElementById('status').className = 'status';
  }

  function saveScore() {
    const name = document.getElementById('playerName').value.trim();
    if (!name) {
      const inp = document.getElementById('playerName');
      inp.style.borderColor = '#e74c3c';
      setTimeout(function() { inp.style.borderColor = '#bdc3c7'; }, 800);
      return;
    }
    const scores = getScores();
    const now = new Date();
    const ds = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    scores.push({ name: name, guesses: pendingScore, date: ds });
    scores.sort(function(a,b) { return a.guesses - b.guesses; });
    if (scores.length > 10) scores.length = 10;
    saveScores(scores);
    renderLeaderboard();
    document.getElementById('nameModal').classList.remove('show');
    pendingScore = null;
  }

  function evaluateGuess(guess) {
    let black = 0, white = 0;
    const su = [false,false,false,false], gu = [false,false,false,false];
    for (let i = 0; i < PEGS_PER_ROW; i++) {
      if (guess[i] === secret[i]) { black++; su[i]=true; gu[i]=true; }
    }
    for (let i = 0; i < PEGS_PER_ROW; i++) {
      if (gu[i]) continue;
      for (let j = 0; j < PEGS_PER_ROW; j++) {
        if (su[j]) continue;
        if (guess[i] === secret[j]) { white++; su[j]=true; gu[i]=true; break; }
      }
    }
    return { black: black, white: white };
  }

  function renderFeedback(idx, fb) {
    const c = document.getElementById('f-'+idx);
    c.innerHTML = '';
    const pegs = [];
    for (let i = 0; i < fb.black; i++) pegs.push('fb-black');
    for (let i = 0; i < fb.white; i++) pegs.push('fb-white');
    while (pegs.length < PEGS_PER_ROW) pegs.push('fb-empty');
    pegs.forEach(function(cls) {
      const d = document.createElement('div');
      d.className = 'feedback-peg '+cls;
      c.appendChild(d);
    });
  }

  function shareGame() {
    const url = window.location.href;
    const text = '来挑战 Mastermind 猜颜色！看看你能几次猜对？';
    if (navigator.share) {
      navigator.share({ title: 'Mastermind 猜颜色', text: text, url: url });
    } else {
      const ta = document.createElement('textarea');
      ta.value = text + ' ' + url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      alert('链接已复制，快去分享给朋友吧！');
    }
  }

  document.getElementById('playerName').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') saveScore();
  });

  init();
</script>
</body>
</html>
